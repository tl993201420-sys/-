services:
  backend:
    build: ./backend
    volumes:
      - ./data:/app/data          # SQLite 数据库持久化到 ./data/trading.db
    environment:
      - DATABASE_PATH=/app/data/trading.db
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
